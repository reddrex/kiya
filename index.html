<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiya — Asistente para el móvil</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 18px;
      background: #f0f4f8;
      color: #1a1a2e;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 700px;
      padding: 16px 20px 12px;
      background: #fff;
      border-bottom: 2px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #2d3748;
    }

    .header-text p {
      font-size: 0.85rem;
      color: #718096;
    }

    /* ── Status bar ── */
    #status {
      width: 100%;
      max-width: 700px;
      padding: 10px 20px;
      background: #ebf4ff;
      color: #2b6cb0;
      font-size: 0.9rem;
      text-align: center;
      border-bottom: 1px solid #bee3f8;
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      width: 100%;
      max-width: 700px;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Messages ── */
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.55;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: #667eea;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      align-self: flex-start;
      background: #fff;
      color: #2d3748;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    .message.bot ul, .message.bot ol {
      margin: 8px 0 4px 20px;
    }

    .message.bot li {
      margin-bottom: 4px;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      align-items: center;
    }

    .typing-indicator span {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #a0aec0;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-7px); }
    }

    /* ── Input bar ── */
    #form {
      width: 100%;
      max-width: 700px;
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      background: #fff;
      border-top: 2px solid #e2e8f0;
    }

    #input {
      flex: 1;
      padding: 12px 16px;
      font-size: 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 24px;
      outline: none;
      transition: border-color .2s;
    }

    #input:focus { border-color: #667eea; }
    #input:disabled { background: #f7fafc; }

    #send {
      padding: 12px 22px;
      font-size: 1rem;
      font-weight: 600;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      white-space: nowrap;
    }

    #send:hover:not(:disabled) { background: #5a67d8; }
    #send:disabled { opacity: .5; cursor: default; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { font-size: 16px; }
      .message { max-width: 90%; }
      #send { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="avatar">🤖</div>
    <div class="header-text">
      <h1>Kiya</h1>
      <p>Asistente para el móvil</p>
    </div>
  </header>

  <div id="status">Iniciando...</div>

  <div id="chat" role="log" aria-live="polite" aria-label="Conversación con Kiya"></div>

  <form id="form" autocomplete="off">
    <input
      id="input"
      type="text"
      placeholder="Escribe tu pregunta aquí..."
      aria-label="Mensaje"
      disabled
    />
    <button id="send" type="submit" disabled>Enviar</button>
  </form>

  <script src="js/engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
